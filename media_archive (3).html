<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>الأرشيف — معرض دائم</title>
<style>
  :root{
    --accent:#e0a640;
    --accent-dim:#8a6220;
    --accent-text:#1a1408;
    --bg:#121110;
    --panel:#1d1b18;
    --panel2:#28251f;
    --line:#3a362e;
    --line2:#524c40;
    --ink:#f5f0e6;
    --ink-dim:#b3ab9a;
    --ink-faint:#7d7566;
    --danger:#e06a58;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;
    padding-bottom:96px;
  }
  .serif{font-family:'Georgia','Iowan Old Style',serif;}
  .wrap{max-width:760px;margin:0 auto;padding:16px 14px 20px;}

  header{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--line);
  }
  .brand{flex:1;min-width:0;text-align:center;}
  .brand h1{font-size:22px;font-weight:400;margin:0;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .brand p{margin:3px 0 0;color:var(--ink-dim);font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .icon-btn{
    background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;
  }

  .stats{display:flex;gap:10px;margin-bottom:16px;}
  .stat{
    flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:11px 8px;text-align:center;
  }
  .stat b{display:block;font-size:19px;font-weight:600;color:var(--accent);}
  .stat span{font-size:10px;color:var(--ink-faint);}

  .toolbar{display:flex;gap:8px;margin-bottom:12px;}
  .search{
    flex:1;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 13px;border-radius:9px;font-size:14px;
  }
  .search::placeholder{color:var(--ink-faint);}
  .sort-select{
    background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 10px;border-radius:9px;font-size:13px;flex-shrink:0;
  }

  .filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;
    -ms-overflow-style:none;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    font-size:12px;padding:7px 13px;border-radius:20px;white-space:nowrap;
    border:1px solid var(--line2);background:transparent;color:var(--ink-dim);flex-shrink:0;
  }
  .chip.active{background:var(--accent);border-color:var(--accent);color:var(--accent-text);font-weight:600;}
  .chip-add{border-style:dashed;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px;}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:13px;overflow:hidden;
    position:relative;
  }
  .card.selected{outline:2px solid var(--accent);}
  .thumb{background:#000;aspect-ratio:1/1;position:relative;overflow:hidden;cursor:pointer;}
  .thumb img, .thumb video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
  .fav-btn{
    position:absolute;top:7px;left:7px;background:rgba(10,10,10,.65);border:none;
    border-radius:50%;width:29px;height:29px;display:flex;align-items:center;justify-content:center;
    color:#eee;font-size:14px;z-index:2;
  }
  .fav-btn.active{color:var(--accent);}
  .select-box{
    position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;
    border:2px solid rgba(255,255,255,.6);background:rgba(10,10,10,.4);display:none;z-index:2;
  }
  .select-mode .select-box{display:block;}
  .select-box.checked{background:var(--accent);border-color:var(--accent);}
  .type-badge{
    position:absolute;bottom:7px;left:7px;background:rgba(10,10,10,.65);color:#ddd;
    font-size:9px;padding:2px 7px;border-radius:6px;
  }
  .play-hint{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.85);font-size:30px;pointer-events:none;
  }
  .card-body{padding:9px 10px 10px;}
  .card-title{font-size:12.5px;font-weight:600;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:5px;}
  .card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px;min-height:0;}
  .tag{font-size:9.5px;background:var(--panel2);color:var(--ink-dim);
    padding:2px 7px;border-radius:8px;border:1px solid var(--line);}
  .card-actions{display:flex;gap:5px;}
  .card-actions button{
    flex:1;padding:7px 4px;font-size:14px;border-radius:8px;
    border:1px solid var(--line2);background:var(--panel2);color:var(--ink);
  }
  .icon-del{color:var(--danger);}

  .fab-row{
    position:fixed;bottom:18px;left:0;right:0;display:flex;justify-content:center;
    gap:10px;z-index:40;pointer-events:none;
  }
  .fab-row > *{pointer-events:auto;}
  .fab{
    background:var(--accent);border:none;color:var(--accent-text);
    padding:14px 24px;border-radius:30px;font-size:14.5px;font-weight:600;
    display:flex;align-items:center;gap:7px;box-shadow:0 6px 18px rgba(0,0,0,.45);
  }
  .fab-secondary{
    background:var(--panel);border:1px solid var(--line2);color:var(--ink);
    padding:14px 18px;border-radius:30px;font-size:14px;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
  }

  .empty{text-align:center;padding:50px 16px;color:var(--ink-faint);}
  .empty h3{font-weight:400;color:var(--ink-dim);font-size:16px;margin-bottom:6px;}
  .empty p{font-size:13px;margin:0;}

  .sheet-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
    align-items:flex-end;justify-content:center;z-index:60;
  }
  .sheet-bg.open{display:flex;}
  .sheet{
    background:var(--panel);border:1px solid var(--line2);border-top-left-radius:18px;border-top-right-radius:18px;
    padding:18px 16px 26px;max-width:760px;width:100%;max-height:85vh;overflow-y:auto;
  }
  .sheet h3{margin:0 0 14px;font-size:16px;color:var(--ink);}
  .sheet label{display:block;font-size:11.5px;color:var(--ink-faint);margin:10px 0 5px;}
  .sheet input[type=text], .sheet input[type=url]{
    width:100%;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 12px;border-radius:9px;font-size:14px;
  }
  .sheet select{
    width:100%;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 12px;border-radius:9px;font-size:14px;
  }
  .sheet-actions{display:flex;gap:8px;margin-top:16px;}
  .sheet-actions button{flex:1;padding:12px;border-radius:9px;font-size:14px;font-weight:600;
    border:1px solid var(--line2);background:var(--panel2);color:var(--ink);}
  .sheet-actions .primary{background:var(--accent);border-color:var(--accent);color:var(--accent-text);}
  .sheet-actions .danger-btn{background:transparent;border-color:var(--danger);color:var(--danger);}

  .col-item{display:flex;align-items:center;gap:9px;padding:10px 0;font-size:14px;border-bottom:1px solid var(--line);}
  .col-item input{width:19px;height:19px;}

  .section-title{font-size:12px;color:var(--ink-faint);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.04em;}
  .color-row{display:flex;align-items:center;gap:12px;margin:8px 0 6px;flex-wrap:wrap;}
  .swatches{display:flex;gap:11px;flex-wrap:wrap;}
  .swatch{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
  .swatch.active{border-color:var(--ink);box-shadow:0 0 0 2px var(--bg);}
  .native-picker-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
  .native-picker-wrap span{font-size:9px;color:var(--ink-faint);}
  input[type=color]{
    width:40px;height:40px;border-radius:50%;border:2px solid var(--line2);padding:0;
    background:none;cursor:pointer;overflow:hidden;
  }
  input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:50%;}
  .theme-row{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 4px;align-items:center;}
  .theme-swatch{
    width:56px;height:44px;border-radius:9px;border:2px solid var(--line2);cursor:pointer;
    display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
  }
  .theme-swatch.active{border-color:var(--accent);}
  .theme-swatch i{flex:1;}

  .backup-row{display:flex;gap:8px;margin-top:6px;}
  .backup-row button{flex:1;padding:11px;border-radius:9px;font-size:13px;
    border:1px solid var(--line2);background:var(--panel2);color:var(--ink);}

  .toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:9px 16px;border-radius:9px;font-size:12.5px;
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:100;text-align:center;max-width:88%;
  }
  .toast.show{opacity:1;}

  #importFile{display:none;}

  /* ---- Immersive full viewer ---- */
  .lightbox{
    position:fixed;inset:0;background:#000;display:none;
    align-items:center;justify-content:center;z-index:200;flex-direction:column;padding:0;
  }
  .lightbox.open{display:flex;}
  .lightbox-top{
    width:100%;display:flex;justify-content:space-between;align-items:center;
    padding:14px 14px;position:absolute;top:0;left:0;right:0;z-index:2;
    background:linear-gradient(to bottom, rgba(0,0,0,.75), transparent);
  }
  .lightbox-title{color:#eee;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:44%;}
  .lightbox-actions{display:flex;gap:8px;align-items:center;}
  .lightbox-actions button{
    background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:50%;
    font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }
  .lightbox-actions button.active{color:var(--accent);}
  .lightbox-close{background:rgba(255,255,255,.16) !important;}
  .lightbox-content{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .lightbox-content img, .lightbox-content video{max-width:100%;max-height:100%;}
  .lightbox-bottom{
    position:absolute;bottom:0;left:0;right:0;padding:16px;display:flex;justify-content:center;
    background:linear-gradient(to top, rgba(0,0,0,.75), transparent);
  }
  .lightbox-link{color:var(--accent);font-size:13px;background:none;border:none;text-decoration:underline;}

  /* ---- Sidebar drawer ---- */
  .sidebar-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:120;
    display:none;
  }
  .sidebar-overlay.open{display:block;}
  .sidebar{
    position:fixed;top:0;bottom:0;right:0;width:82%;max-width:320px;
    background:var(--panel);border-left:1px solid var(--line2);
    padding:18px 16px 20px;overflow-y:auto;
    transform:translateX(100%);transition:transform .25s ease;
  }
  .sidebar-overlay.open .sidebar{transform:translateX(0);}
  .sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .sidebar-header h2{margin:0;font-size:17px;font-weight:400;}
  .sidebar-stats{display:flex;gap:8px;margin-bottom:16px;}
  .sidebar-stats .stat{padding:9px 6px;}
  .sidebar-stats .stat b{font-size:16px;}
  .sidebar-nav{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
  .sidebar-nav button, .sidebar-col-item{
    display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:right;
    background:transparent;border:none;color:var(--ink-dim);padding:11px 10px;border-radius:9px;font-size:14px;
  }
  .sidebar-nav button.active, .sidebar-col-item.active{background:var(--panel2);color:var(--ink);font-weight:600;}
  .sidebar-col-item span.cnt{color:var(--ink-faint);font-size:11px;font-weight:400;}
  .sidebar-add-col{
    width:100%;margin-top:6px;padding:10px;border-radius:9px;font-size:13px;text-align:center;
    border:1px dashed var(--line2);background:transparent;color:var(--ink-dim);
  }

  /* ---- Home page ---- */
  .home-section{margin-bottom:22px;}
  .home-section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .home-section-head h2{font-size:14px;font-weight:600;color:var(--ink-dim);margin:0;text-transform:uppercase;letter-spacing:.03em;}
  .see-all{font-size:12px;color:var(--accent);background:none;border:none;}
  .col-pill-row{display:flex;gap:8px;flex-wrap:wrap;}
  .col-pill{
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:10px 15px;border-radius:12px;font-size:13px;display:flex;align-items:center;gap:6px;
  }
  .col-pill span.cnt{color:var(--ink-faint);font-size:11px;}
  .col-pill-add{border-style:dashed;color:var(--ink-dim);}
  .page-title{font-size:18px;font-weight:400;margin:0 0 14px;color:var(--ink);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="icon-btn" id="btnMenu">☰</button>
    <div class="brand">
      <h1 class="serif" id="pageHeading">الأرشيف</h1>
      <p id="pageSub">معرضك الدائم — لا يضيع مع تبديل الحسابات</p>
    </div>
    <button class="icon-btn" id="btnSettings">⚙</button>
  </header>

  <!-- HOME VIEW -->
  <div id="homeView">
    <div class="stats">
      <div class="stat"><b id="statTotal">0</b><span>عناصر</span></div>
      <div class="stat"><b id="statFav">0</b><span>مفضلة</span></div>
      <div class="stat"><b id="statCol">0</b><span>قوائم</span></div>
    </div>

    <div class="home-section">
      <div class="home-section-head">
        <h2>القوائم الرئيسية</h2>
        <button class="see-all" data-view="all">كل العناصر ›</button>
      </div>
      <div class="col-pill-row" id="homeCollections"></div>
    </div>

    <div class="home-section">
      <div class="home-section-head">
        <h2>★ المفضلة</h2>
        <button class="see-all" data-view="fav">عرض الكل ›</button>
      </div>
      <div id="homeFavGrid"></div>
    </div>
  </div>

  <!-- LIST VIEW (all / fav / collection) -->
  <div id="listView" style="display:none;">
    <h2 class="page-title" id="listTitle"></h2>
    <div class="toolbar">
      <input class="search" id="searchBox" placeholder="بحث بالعنوان...">
      <select class="sort-select" id="sortSelect">
        <option value="newest">الأحدث</option>
        <option value="oldest">الأقدم</option>
        <option value="name">أبجدي</option>
      </select>
    </div>
    <div id="gridArea"></div>
  </div>
</div>

<div class="fab-row">
  <button class="fab-secondary" id="btnSelectMode">تحديد</button>
  <button class="fab" id="btnOpenAdd">+ إضافة عنصر</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar-overlay" id="sidebarOverlay">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 class="serif">التصفح</h2>
      <button class="icon-btn" id="btnCloseSidebar">✕</button>
    </div>
    <div class="sidebar-stats">
      <div class="stat"><b id="sbStatTotal">0</b><span>عناصر</span></div>
      <div class="stat"><b id="sbStatFav">0</b><span>مفضلة</span></div>
      <div class="stat"><b id="sbStatCol">0</b><span>قوائم</span></div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="section-title">القوائم</div>
    <div id="sidebarCollections"></div>
    <button class="sidebar-add-col" id="btnSidebarAddCol">+ قائمة جديدة</button>
  </div>
</div>

<div class="sheet-bg" id="addSheetBg">
  <div class="sheet">
    <h3>إضافة عنصر جديد</h3>
    <label>الرابط</label>
    <input type="url" id="inUrl" placeholder="الصق رابط الصورة أو الفيديو">
    <label>النوع</label>
    <select id="inType">
      <option value="auto">كشف تلقائي</option>
      <option value="image">صورة</option>
      <option value="video">فيديو</option>
    </select>
    <label>عنوان (اختياري)</label>
    <input type="text" id="inTitle" placeholder="وصف قصير">
    <div class="sheet-actions">
      <button id="btnCancelAdd">إلغاء</button>
      <button class="primary" id="btnAdd">حفظ في الأرشيف</button>
    </div>
  </div>
</div>

<div class="sheet-bg" id="collectionSheetBg">
  <div class="sheet">
    <h3>أضف إلى قائمة</h3>
    <div id="colList"></div>
    <label>قائمة جديدة</label>
    <input type="text" id="newColName" placeholder="اسم القائمة">
    <div class="sheet-actions">
      <button id="btnCloseColSheet">تم</button>
      <button class="primary" id="btnCreateCol">إنشاء وإضافة</button>
    </div>
  </div>
</div>

<div class="sheet-bg" id="selectSheetBg">
  <div class="sheet">
    <h3 id="selectCountTitle">0 محدد</h3>
    <div class="sheet-actions">
      <button id="btnCancelSelect">إلغاء التحديد</button>
      <button class="danger-btn" id="btnDeleteSelected">حذف المحدد</button>
    </div>
  </div>
</div>

<div class="sheet-bg" id="settingsSheetBg">
  <div class="sheet">
    <h3>مظهر الواجهة</h3>

    <div class="section-title">خلفية الواجهة</div>
    <div class="theme-row" id="themeRow">
      <div class="native-picker-wrap">
        <input type="color" id="bgColorPicker" value="#121110">
        <span>مخصص</span>
      </div>
    </div>

    <div class="section-title">لون التمييز</div>
    <div class="color-row">
      <div class="swatches" id="swatches"></div>
      <div class="native-picker-wrap">
        <input type="color" id="accentColorPicker" value="#e0a640">
        <span>مخصص</span>
      </div>
    </div>

    <div class="section-title">نسخة احتياطية</div>
    <div class="backup-row">
      <button id="btnExport">تصدير نسخة (JSON)</button>
      <button id="btnImportTrigger">استيراد نسخة</button>
    </div>
    <input type="file" id="importFile" accept=".json">

    <div class="sheet-actions">
      <button class="primary" id="btnCloseSettings">تم</button>
    </div>
  </div>
</div>

<!-- IMMERSIVE FULL VIEWER -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-top">
    <span class="lightbox-title" id="lightboxTitle"></span>
    <div class="lightbox-actions">
      <button id="lightboxFav" title="مفضلة">★</button>
      <button id="lightboxFullscreen" title="ملء الشاشة">⛶</button>
      <button class="lightbox-close" id="lightboxClose" title="خروج">✕</button>
    </div>
  </div>
  <div class="lightbox-content" id="lightboxContent"></div>
  <div class="lightbox-bottom">
    <button class="lightbox-link" id="lightboxLink">فتح الرابط الأصلي في تبويب جديد</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items = [];
let collections = [];
let currentView = 'home';       // 'home' | 'all' | 'fav' | 'col:<name>'
let searchTerm = '';
let sortMode = 'newest';
let modalItemId = null;
let lightboxItemId = null;
let selectMode = false;
let selectedIds = new Set();

const PRESET_COLORS = ['#e0a640','#5b9dd8','#7bbf6a','#d8607a','#a67bd8','#4fb3a8','#d8d357','#e0723f'];

const THEMES = {
  warm:  {name:'ليلي دافئ', bg:'#121110'},
  black: {name:'أسود نقي', bg:'#0a0a0a'},
  navy:  {name:'كحلي عميق', bg:'#0e1420'},
  slate: {name:'رمادي غرافيت', bg:'#161718'},
  cream: {name:'فاتح', bg:'#f4f1ea'}
};

function hexToRgb(hex){
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
function rgbToHex(r,g,b){
  const c = v => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');
  return '#' + c(r) + c(g) + c(b);
}
function mixHex(hex, target, amt){
  const a = hexToRgb(hex), b = hexToRgb(target);
  return rgbToHex(a.r + (b.r-a.r)*amt, a.g + (b.g-a.g)*amt, a.b + (b.b-a.b)*amt);
}
function isLight(hex){
  const {r,g,b} = hexToRgb(hex);
  return (r*299+g*587+b*114)/1000 > 150;
}
function hexToDim(hex){ return mixHex(hex, '#000000', 0.35); }

function applyAccent(hex, skipSave){
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-dim', hexToDim(hex));
  document.documentElement.style.setProperty('--accent-text', isLight(hex) ? '#1a1a1a' : '#fff8ec');
  if(!skipSave) localStorage.setItem('archive-accent', hex);
  document.getElementById('accentColorPicker').value = hex;
  renderSwatches(hex);
}

function buildThemeFromBase(baseHex){
  const light = isLight(baseHex);
  if(!light){
    return {
      bg: baseHex,
      panel: mixHex(baseHex,'#ffffff',0.07),
      panel2: mixHex(baseHex,'#ffffff',0.14),
      line: mixHex(baseHex,'#ffffff',0.22),
      line2: mixHex(baseHex,'#ffffff',0.32),
      ink: '#f5f0e6', inkDim: '#b3ab9a', inkFaint: '#7d7566'
    };
  }else{
    return {
      bg: baseHex,
      panel: mixHex(baseHex,'#000000',0.03),
      panel2: mixHex(baseHex,'#000000',0.07),
      line: mixHex(baseHex,'#000000',0.15),
      line2: mixHex(baseHex,'#000000',0.26),
      ink: '#201c14', inkDim: '#5c564a', inkFaint: '#8a8371'
    };
  }
}

function applyThemeObj(t){
  document.documentElement.style.setProperty('--bg', t.bg);
  document.documentElement.style.setProperty('--panel', t.panel);
  document.documentElement.style.setProperty('--panel2', t.panel2);
  document.documentElement.style.setProperty('--line', t.line);
  document.documentElement.style.setProperty('--line2', t.line2);
  document.documentElement.style.setProperty('--ink', t.ink);
  document.documentElement.style.setProperty('--ink-dim', t.inkDim);
  document.documentElement.style.setProperty('--ink-faint', t.inkFaint);
}

function applyTheme(baseHex, skipSave){
  const t = buildThemeFromBase(baseHex);
  applyThemeObj(t);
  if(!skipSave) localStorage.setItem('archive-bg', baseHex);
  document.getElementById('bgColorPicker').value = baseHex;
  renderThemeRow(baseHex);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function detectType(url){
  const u = url.toLowerCase().split('?')[0];
  if(u.match(/\.(mp4|webm|mov|m4v)$/)) return 'video';
  return 'image';
}

function loadData(){
  try{ items = JSON.parse(localStorage.getItem('archive-items') || '[]'); }catch(e){ items = []; }
  try{ collections = JSON.parse(localStorage.getItem('archive-collections') || '[]'); }catch(e){ collections = []; }
  const savedColor = localStorage.getItem('archive-accent') || '#e0a640';
  const savedBg = localStorage.getItem('archive-bg') || THEMES.warm.bg;
  applyAccent(savedColor, true);
  applyTheme(savedBg, true);
  render();
}
function saveItems(){ localStorage.setItem('archive-items', JSON.stringify(items)); }
function saveCollections(){ localStorage.setItem('archive-collections', JSON.stringify(collections)); }

function addItem(){
  const url = document.getElementById('inUrl').value.trim();
  if(!url){ showToast('الصق رابط أولا'); return; }
  const typeSel = document.getElementById('inType').value;
  const type = typeSel === 'auto' ? detectType(url) : typeSel;
  const title = document.getElementById('inTitle').value.trim() || 'بدون عنوان';
  items.unshift({
    id: 'm' + Date.now() + Math.floor(Math.random()*1000),
    url, type, title, favorite:false, collections:[], createdAt: Date.now()
  });
  document.getElementById('inUrl').value = '';
  document.getElementById('inTitle').value = '';
  saveItems();
  closeSheet('addSheetBg');
  render();
  showToast('تم الحفظ في الأرشيف');
}

function toggleFav(id){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  it.favorite = !it.favorite;
  saveItems();
  render();
  if(lightboxItemId === id) syncLightboxFavButton();
}
function deleteItem(id){
  items = items.filter(i=>i.id!==id);
  saveItems();
  render();
  showToast('تم الحذف');
}

function openSheet(id){ document.getElementById(id).classList.add('open'); }
function closeSheet(id){ document.getElementById(id).classList.remove('open'); }

/* ---------- Sidebar ---------- */
function openSidebar(){ renderSidebar(); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar(){ document.getElementById('sidebarOverlay').classList.remove('open'); }

function renderSidebar(){
  document.getElementById('sbStatTotal').textContent = items.length;
  document.getElementById('sbStatFav').textContent = items.filter(i=>i.favorite).length;
  document.getElementById('sbStatCol').textContent = collections.length;

  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  [
    {v:'home', label:'🏠 الرئيسية'},
    {v:'all', label:'🗂 كل العناصر'},
    {v:'fav', label:'★ المفضلة'}
  ].forEach(o=>{
    const b = document.createElement('button');
    b.textContent = o.label;
    if(currentView === o.v) b.classList.add('active');
    b.addEventListener('click', ()=>navigate(o.v));
    nav.appendChild(b);
  });

  const colWrap = document.getElementById('sidebarCollections');
  colWrap.innerHTML = '';
  if(collections.length === 0){
    colWrap.innerHTML = '<p style="color:var(--ink-faint);font-size:12.5px;">لا توجد قوائم بعد.</p>';
  }
  collections.forEach(col=>{
    const count = items.filter(i=>i.collections.includes(col)).length;
    const b = document.createElement('button');
    b.className = 'sidebar-col-item' + (currentView === 'col:'+col ? ' active' : '');
    b.innerHTML = `<span>${col}</span><span class="cnt">${count}</span>`;
    b.addEventListener('click', ()=>navigate('col:'+col));
    colWrap.appendChild(b);
  });
}

function navigate(view){
  currentView = view;
  searchTerm = '';
  const sb = document.getElementById('searchBox');
  if(sb) sb.value = '';
  closeSidebar();
  render();
  window.scrollTo(0,0);
}

/* ---------- Lightbox / immersive viewer ---------- */
function openLightbox(it){
  lightboxItemId = it.id;
  const content = document.getElementById('lightboxContent');
  content.innerHTML = it.type === 'video'
    ? `<video src="${it.url}" controls autoplay playsinline></video>`
    : `<img src="${it.url}" alt="">`;
  document.getElementById('lightboxTitle').textContent = it.title;
  document.getElementById('lightboxLink').onclick = ()=>window.open(it.url,'_blank');
  syncLightboxFavButton();
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  if(lb.requestFullscreen){ lb.requestFullscreen().catch(()=>{}); }
  else if(lb.webkitRequestFullscreen){ lb.webkitRequestFullscreen(); }
}
function syncLightboxFavButton(){
  const it = items.find(i=>i.id===lightboxItemId);
  const btn = document.getElementById('lightboxFav');
  if(it && it.favorite) btn.classList.add('active'); else btn.classList.remove('active');
}
function closeLightbox(){
  if(document.fullscreenElement){ document.exitFullscreen().catch(()=>{}); }
  else if(document.webkitFullscreenElement && document.webkitExitFullscreen){ document.webkitExitFullscreen(); }
  const content = document.getElementById('lightboxContent');
  const v = content.querySelector('video');
  if(v) v.pause();
  content.innerHTML = '';
  document.getElementById('lightbox').classList.remove('open');
  lightboxItemId = null;
}
function toggleLightboxFullscreen(){
  const lb = document.getElementById('lightbox');
  if(document.fullscreenElement || document.webkitFullscreenElement){
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  }else{
    if(lb.requestFullscreen) lb.requestFullscreen().catch(()=>{});
    else if(lb.webkitRequestFullscreen) lb.webkitRequestFullscreen();
  }
}
document.addEventListener('fullscreenchange', ()=>{
  if(!document.fullscreenElement && document.getElementById('lightbox').classList.contains('open')){
    // user exited fullscreen (Esc / back) — also close the viewer
    closeLightbox();
  }
});

/* ---------- Collections modal ---------- */
function openCollectionModal(id){
  modalItemId = id;
  renderColList();
  openSheet('collectionSheetBg');
}
function renderColList(){
  const wrap = document.getElementById('colList');
  wrap.innerHTML = '';
  const it = items.find(i=>i.id===modalItemId);
  if(!it) return;
  if(collections.length === 0){
    wrap.innerHTML = '<p style="color:var(--ink-faint);font-size:13px;">لا توجد قوائم بعد.</p>';
  }
  collections.forEach(col=>{
    const row = document.createElement('div');
    row.className = 'col-item';
    const checked = it.collections.includes(col) ? 'checked' : '';
    row.innerHTML = `<input type="checkbox" ${checked}> <span>${col}</span>`;
    row.querySelector('input').addEventListener('change', (e)=>{
      if(e.target.checked){ if(!it.collections.includes(col)) it.collections.push(col); }
      else{ it.collections = it.collections.filter(c=>c!==col); }
      saveItems();
      render();
    });
    wrap.appendChild(row);
  });
}
function createCollectionAndAdd(){
  const name = document.getElementById('newColName').value.trim();
  if(!name) return;
  if(!collections.includes(name)) collections.push(name);
  const it = items.find(i=>i.id===modalItemId);
  if(it && !it.collections.includes(name)) it.collections.push(name);
  document.getElementById('newColName').value = '';
  saveCollections();
  saveItems();
  renderColList();
  render();
  showToast('تم إنشاء القائمة');
}
function createStandaloneCollection(){
  const name = prompt('اسم القائمة الجديدة:');
  if(!name || !name.trim()) return;
  const clean = name.trim();
  if(!collections.includes(clean)) collections.push(clean);
  saveCollections();
  render();
  showToast('تم إنشاء القائمة: ' + clean);
}

/* ---------- Card building (shared by list view & home preview) ---------- */
function buildCard(it, opts){
  opts = opts || {};
  const compact = !!opts.compact;
  const card = document.createElement('div');
  card.className = 'card' + (selectedIds.has(it.id) ? ' selected' : '');
  const media = it.type === 'video'
    ? `<video src="${it.url}" muted playsinline preload="metadata"></video>`
    : `<img src="${it.url}" loading="lazy" alt="">`;
  card.innerHTML = `
    <div class="thumb">
      ${media}
      ${it.type==='video' ? '<div class="play-hint">▶</div>' : ''}
      <button class="fav-btn ${it.favorite?'active':''}" title="إضافة للمفضلة">★</button>
      <div class="select-box ${selectedIds.has(it.id)?'checked':''}"></div>
      <span class="type-badge">${it.type==='video'?'فيديو':'صورة'}</span>
    </div>
    ${compact ? '' : `
    <div class="card-body">
      <div class="card-title">${it.title}</div>
      <div class="card-tags">${it.collections.map(c=>`<span class="tag">${c}</span>`).join('')}</div>
      <div class="card-actions">
        <button class="btn-view" title="عرض">▶</button>
        <button class="btn-col" title="قوائم">☰</button>
        <button class="icon-del btn-del" title="حذف">✕</button>
      </div>
    </div>`}
  `;
  const thumb = card.querySelector('.thumb');
  if(!compact && selectMode){
    card.addEventListener('click', ()=>toggleSelect(it.id));
  }else{
    thumb.addEventListener('click', ()=>openLightbox(it));
    card.querySelector('.fav-btn').addEventListener('click', (e)=>{ e.stopPropagation(); toggleFav(it.id); });
    if(!compact){
      card.querySelector('.btn-view').addEventListener('click', ()=>openLightbox(it));
      card.querySelector('.btn-col').addEventListener('click', ()=>openCollectionModal(it.id));
      card.querySelector('.btn-del').addEventListener('click', ()=>{
        if(confirm('حذف هذا العنصر من الأرشيف؟')) deleteItem(it.id);
      });
    }
  }
  return card;
}

/* ---------- Rendering ---------- */
function sortItems(list){
  const l = [...list];
  if(sortMode === 'newest') l.sort((a,b)=>b.createdAt-a.createdAt);
  else if(sortMode === 'oldest') l.sort((a,b)=>a.createdAt-b.createdAt);
  else if(sortMode === 'name') l.sort((a,b)=>a.title.localeCompare(b.title,'ar'));
  return l;
}

function renderHome(){
  document.getElementById('statTotal').textContent = items.length;
  document.getElementById('statFav').textContent = items.filter(i=>i.favorite).length;
  document.getElementById('statCol').textContent = collections.length;

  const colWrap = document.getElementById('homeCollections');
  colWrap.innerHTML = '';
  collections.forEach(col=>{
    const count = items.filter(i=>i.collections.includes(col)).length;
    const b = document.createElement('button');
    b.className = 'col-pill';
    b.innerHTML = `<span>${col}</span><span class="cnt">${count}</span>`;
    b.addEventListener('click', ()=>navigate('col:'+col));
    colWrap.appendChild(b);
  });
  const addPill = document.createElement('button');
  addPill.className = 'col-pill col-pill-add';
  addPill.textContent = '+ قائمة جديدة';
  addPill.addEventListener('click', createStandaloneCollection);
  colWrap.appendChild(addPill);

  const favGrid = document.getElementById('homeFavGrid');
  const favs = sortItems(items.filter(i=>i.favorite)).slice(0,8);
  if(favs.length === 0){
    favGrid.innerHTML = '<div class="empty" style="padding:24px 10px;"><p>لا توجد عناصر مفضلة بعد. اضغط ★ على أي عنصر لإضافته هنا.</p></div>';
  }else{
    const grid = document.createElement('div');
    grid.className = 'grid';
    favs.forEach(it=> grid.appendChild(buildCard(it, {compact:true})) );
    favGrid.innerHTML = '';
    favGrid.appendChild(grid);
  }
}

function renderList(){
  let title = '';
  let list = items;
  if(currentView === 'all'){ title = 'كل العناصر'; }
  else if(currentView === 'fav'){ title = '★ المفضلة'; list = items.filter(i=>i.favorite); }
  else if(currentView.startsWith('col:')){
    const name = currentView.slice(4);
    title = name;
    list = items.filter(i=>i.collections.includes(name));
  }
  document.getElementById('listTitle').textContent = title;

  if(searchTerm) list = list.filter(i=>i.title.toLowerCase().includes(searchTerm.toLowerCase()));
  list = sortItems(list);

  const area = document.getElementById('gridArea');
  if(list.length === 0){
    area.innerHTML = `<div class="empty"><h3 class="serif">لا شيء هنا بعد</h3><p>الصق رابط صورة أو فيديو فوق لحفظه بشكل دائم.</p></div>`;
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'grid' + (selectMode ? ' select-mode' : '');
  list.forEach(it=> grid.appendChild(buildCard(it)) );
  area.innerHTML = '';
  area.appendChild(grid);
}

function render(){
  const isHome = currentView === 'home';
  document.getElementById('homeView').style.display = isHome ? '' : 'none';
  document.getElementById('listView').style.display = isHome ? 'none' : '';

  document.getElementById('pageHeading').textContent = isHome ? 'الأرشيف' : (
    currentView === 'all' ? 'كل العناصر' :
    currentView === 'fav' ? 'المفضلة' :
    currentView.startsWith('col:') ? currentView.slice(4) : 'الأرشيف'
  );
  document.getElementById('pageSub').textContent = isHome
    ? 'معرضك الدائم — لا يضيع مع تبديل الحسابات'
    : (items.length + ' عنصر في الأرشيف');

  if(isHome) renderHome(); else renderList();
  renderSidebar();
}

function toggleSelect(id){
  if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  render();
  document.getElementById('selectCountTitle').textContent = selectedIds.size + ' محدد';
  if(selectedIds.size > 0) openSheet('selectSheetBg'); else closeSheet('selectSheetBg');
}
function enterSelectMode(){
  if(currentView === 'home') navigate('all');
  selectMode = true; selectedIds.clear();
  document.getElementById('btnOpenAdd').style.display = 'none';
  document.getElementById('btnSelectMode').textContent = 'إلغاء';
  render();
}
function exitSelectMode(){
  selectMode = false; selectedIds.clear();
  document.getElementById('btnOpenAdd').style.display = '';
  document.getElementById('btnSelectMode').textContent = 'تحديد';
  render();
}

function exportBackup(){
  const data = JSON.stringify({items, collections}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'archive-backup.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('تم تجهيز ملف النسخة الاحتياطية');
}
function importBackup(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(Array.isArray(data.items)){
        const existingIds = new Set(items.map(i=>i.id));
        data.items.forEach(it=>{ if(!existingIds.has(it.id)) items.push(it); });
      }
      if(Array.isArray(data.collections)){
        data.collections.forEach(c=>{ if(!collections.includes(c)) collections.push(c); });
      }
      saveItems(); saveCollections(); render();
      showToast('تم استيراد النسخة الاحتياطية');
    }catch(err){ showToast('ملف غير صالح'); }
  };
  reader.readAsText(file);
}

function renderThemeRow(activeBase){
  const wrap = document.getElementById('themeRow');
  wrap.querySelectorAll('.theme-swatch').forEach(el=>el.remove());
  const pickerWrap = wrap.querySelector('.native-picker-wrap');
  Object.keys(THEMES).forEach(key=>{
    const t = THEMES[key];
    const el = document.createElement('div');
    el.className = 'theme-swatch' + (t.bg.toLowerCase()===(activeBase||'').toLowerCase() ? ' active' : '');
    el.style.background = t.bg;
    el.title = t.name;
    el.addEventListener('click', ()=>applyTheme(t.bg));
    wrap.insertBefore(el, pickerWrap);
  });
}

function renderSwatches(activeHex){
  const wrap = document.getElementById('swatches');
  wrap.innerHTML = '';
  PRESET_COLORS.forEach(hex=>{
    const s = document.createElement('div');
    s.className = 'swatch' + (hex.toLowerCase()===(activeHex||'').toLowerCase() ? ' active' : '');
    s.style.background = hex;
    s.addEventListener('click', ()=>applyAccent(hex));
    wrap.appendChild(s);
  });
}

/* ---------- Event wiring ---------- */
document.getElementById('btnMenu').addEventListener('click', openSidebar);
document.getElementById('btnCloseSidebar').addEventListener('click', closeSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'sidebarOverlay') closeSidebar();
});
document.getElementById('btnSidebarAddCol').addEventListener('click', createStandaloneCollection);

document.getElementById('homeView').addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-view]');
  if(btn) navigate(btn.dataset.view);
});

document.getElementById('btnOpenAdd').addEventListener('click', ()=>openSheet('addSheetBg'));
document.getElementById('btnCancelAdd').addEventListener('click', ()=>closeSheet('addSheetBg'));
document.getElementById('btnAdd').addEventListener('click', addItem);
document.getElementById('searchBox').addEventListener('input', e=>{ searchTerm = e.target.value; renderList(); });
document.getElementById('sortSelect').addEventListener('change', e=>{ sortMode = e.target.value; renderList(); });
document.getElementById('btnCloseColSheet').addEventListener('click', ()=>closeSheet('collectionSheetBg'));
document.getElementById('btnCreateCol').addEventListener('click', createCollectionAndAdd);
document.getElementById('btnSettings').addEventListener('click', ()=>openSheet('settingsSheetBg'));
document.getElementById('btnCloseSettings').addEventListener('click', ()=>closeSheet('settingsSheetBg'));
document.getElementById('accentColorPicker').addEventListener('input', (e)=>applyAccent(e.target.value));
document.getElementById('bgColorPicker').addEventListener('input', (e)=>applyTheme(e.target.value));
document.getElementById('btnSelectMode').addEventListener('click', ()=>{
  if(selectMode) exitSelectMode(); else enterSelectMode();
});
document.getElementById('btnCancelSelect').addEventListener('click', ()=>{ closeSheet('selectSheetBg'); exitSelectMode(); });
document.getElementById('btnDeleteSelected').addEventListener('click', ()=>{
  if(selectedIds.size === 0) return;
  if(confirm(`حذف ${selectedIds.size} عنصر؟`)){
    items = items.filter(i=>!selectedIds.has(i.id));
    saveItems();
    closeSheet('selectSheetBg');
    exitSelectMode();
    showToast('تم الحذف');
  }
});
document.getElementById('btnExport').addEventListener('click', exportBackup);
document.getElementById('btnImportTrigger').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  if(e.target.files[0]) importBackup(e.target.files[0]);
  e.target.value = '';
});
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxFullscreen').addEventListener('click', toggleLightboxFullscreen);
document.getElementById('lightboxFav').addEventListener('click', ()=>{ if(lightboxItemId) toggleFav(lightboxItemId); });
['addSheetBg','collectionSheetBg','settingsSheetBg','selectSheetBg'].forEach(id=>{
  document.getElementById(id).addEventListener('click', e=>{ if(e.target.id === id) closeSheet(id); });
});

loadData();
</script>
</body>
</html>
