<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#121110" id="themeColorMeta">
<title>الأرشيف — معرض دائم</title>
<style>
  :root{
    --accent:#e0a640;
    --accent-dim:#8a6220;
    --accent-text:#1a1408;
    --bg:#121110;
    --panel:#1d1b18;
    --panel2:#28251f;
    --line:#3a362e;
    --line2:#524c40;
    --ink:#f5f0e6;
    --ink-dim:#b3ab9a;
    --ink-faint:#7d7566;
    --danger:#e06a58;
    --grid-min:150px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh;
    padding-bottom:96px;
  }
  .serif{font-family:'Georgia','Iowan Old Style',serif;}
  .mono{font-family:'SFMono-Regular',Menlo,Consolas,'Courier New',monospace;}
  .wrap{max-width:760px;margin:0 auto;padding:16px 14px 20px;}
  button, input, select, textarea{font-family:inherit;}
  button{cursor:pointer;}

  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--accent); outline-offset:2px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }

  header{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--line);
  }
  .brand{flex:1;min-width:0;text-align:center;}
  .brand h1{font-size:22px;font-weight:400;margin:0;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .brand p{margin:3px 0 0;color:var(--ink-dim);font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .icon-btn{
    background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .icon-btn.small{width:38px;height:38px;}
  .icon-btn svg, button svg.icn{display:block;}

  .stats{display:flex;gap:10px;margin-bottom:16px;}
  .stat{
    flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:11px 8px;text-align:center;
  }
  .stat b{display:block;font-size:19px;font-weight:600;color:var(--accent);}
  .stat span{font-size:10px;color:var(--ink-faint);}

  .toolbar{display:flex;gap:8px;margin-bottom:12px;}
  .search{
    flex:1;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 13px;border-radius:9px;font-size:14px;min-width:0;
  }
  .search::placeholder{color:var(--ink-faint);}
  .sort-select{
    background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 10px;border-radius:9px;font-size:13px;flex-shrink:0;
  }

  .filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;
    -ms-overflow-style:none;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    font-size:12px;padding:7px 13px;border-radius:20px;white-space:nowrap;
    border:1px solid var(--line2);background:transparent;color:var(--ink-dim);flex-shrink:0;
  }
  .chip.active{background:var(--accent);border-color:var(--accent);color:var(--accent-text);font-weight:600;}
  .chip-add{border-style:dashed;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--grid-min),1fr));gap:11px;}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:13px;overflow:hidden;
    position:relative;box-shadow:0 1px 3px rgba(0,0,0,.22);transition:border-color .15s;
  }
  .card:hover{border-color:var(--line2);}
  .card.selected{outline:2px solid var(--accent);outline-offset:-2px;}
  .thumb{background:var(--panel2);aspect-ratio:1/1;position:relative;overflow:hidden;cursor:pointer;}
  .thumb img, .thumb video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;transition:transform .35s ease;}
  .card:hover .thumb img, .card:hover .thumb video{transform:scale(1.04);}
  .thumb.loading::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(100deg, var(--panel) 30%, var(--panel2) 45%, var(--panel) 60%);
    background-size:300% 100%;animation:shimmer 1.3s ease infinite;
  }
  @keyframes shimmer{0%{background-position:120% 0}100%{background-position:-20% 0}}
  .thumb-placeholder{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--ink-faint);background:var(--panel2);
  }
  .fav-btn{
    position:absolute;top:7px;left:7px;background:rgba(10,10,10,.65);border:none;
    border-radius:50%;width:29px;height:29px;display:flex;align-items:center;justify-content:center;
    color:#eee;z-index:2;
  }
  .fav-btn svg{fill:none;stroke:currentColor;}
  .fav-btn.active{color:var(--accent);}
  .fav-btn.active svg{fill:currentColor;}
  .select-box{
    position:absolute;top:7px;right:7px;width:22px;height:22px;border-radius:50%;
    border:2px solid rgba(255,255,255,.6);background:rgba(10,10,10,.4);display:none;z-index:2;
    align-items:center;justify-content:center;color:#fff;
  }
  .select-mode .select-box{display:flex;}
  .select-box.checked{background:var(--accent);border-color:var(--accent);color:var(--accent-text);}
  .type-badge{
    position:absolute;bottom:7px;left:7px;background:rgba(10,10,10,.65);color:#ddd;
    font-size:9px;padding:3px 7px 3px 6px;border-radius:6px;display:flex;align-items:center;gap:4px;
  }
  .play-hint{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.85);pointer-events:none;
  }
  .card-body{padding:9px 10px 10px;}
  .card-title{font-size:12.5px;font-weight:600;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;}
  .card-meta{font-size:9.5px;color:var(--ink-faint);letter-spacing:.02em;margin-bottom:7px;}
  .card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px;min-height:0;}
  .tag{font-size:9.5px;background:var(--panel2);color:var(--ink-dim);
    padding:2px 7px;border-radius:8px;border:1px solid var(--line);}
  .card-actions{display:flex;gap:5px;}
  .card-actions button{
    padding:7px 4px;border-radius:8px;
    border:1px solid var(--line2);background:var(--panel2);color:var(--ink);
  }
  .btn-view{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;font-size:12px;}
  .btn-more{width:36px;flex:none;display:flex;align-items:center;justify-content:center;}

  .fab-row{
    position:fixed;bottom:18px;left:0;right:0;display:flex;justify-content:center;
    gap:10px;z-index:40;pointer-events:none;
  }
  .fab-row > *{pointer-events:auto;}
  .fab{
    background:var(--accent);border:none;color:var(--accent-text);
    padding:14px 24px;border-radius:30px;font-size:14.5px;font-weight:600;
    display:flex;align-items:center;gap:7px;box-shadow:0 6px 18px rgba(0,0,0,.45);
  }
  .fab-secondary{
    background:var(--panel);border:1px solid var(--line2);color:var(--ink);
    padding:14px 18px;border-radius:30px;font-size:14px;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
  }

  .empty{text-align:center;padding:50px 16px;color:var(--ink-faint);}
  .empty-icon{width:48px;height:48px;margin:0 auto 14px;opacity:.55;}
  .empty-icon svg{width:100%;height:100%;}
  .empty h3{font-weight:400;color:var(--ink-dim);font-size:16px;margin-bottom:6px;}
  .empty p{font-size:13px;margin:0;}
  .hint-text{color:var(--ink-faint);font-size:12.5px;}

  .sheet-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;
    align-items:flex-end;justify-content:center;z-index:60;
    opacity:0;visibility:hidden;pointer-events:none;
    transition:opacity .2s ease, visibility 0s linear .2s;
  }
  .sheet-bg.open{opacity:1;visibility:visible;pointer-events:auto;transition:opacity .2s ease;}
  .sheet{
    background:var(--panel);border:1px solid var(--line2);border-top-left-radius:18px;border-top-right-radius:18px;
    padding:18px 16px 26px;max-width:760px;width:100%;max-height:85vh;overflow-y:auto;
    transform:translateY(24px);transition:transform .25s cubic-bezier(.2,.8,.2,1);
  }
  .sheet-bg.open .sheet{transform:translateY(0);}
  .sheet h3{margin:0 0 14px;font-size:16px;color:var(--ink);font-weight:600;}
  .sheet-desc{color:var(--ink-dim);font-size:13px;margin:-8px 0 6px;line-height:1.55;}
  .sheet label{display:block;font-size:11.5px;color:var(--ink-faint);margin:10px 0 5px;}
  .sheet input[type=text], .sheet input[type=url]{
    width:100%;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 12px;border-radius:9px;font-size:14px;
  }
  .sheet textarea{
    width:100%;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 12px;border-radius:9px;font-size:14px;resize:vertical;min-height:64px;line-height:1.5;
  }
  .sheet select{
    width:100%;background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:11px 12px;border-radius:9px;font-size:14px;
  }
  .sheet-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .sheet-actions button{flex:1;padding:12px;border-radius:9px;font-size:13.5px;font-weight:600;
    border:1px solid var(--line2);background:var(--panel2);color:var(--ink);min-width:90px;}
  .sheet-actions .primary{background:var(--accent);border-color:var(--accent);color:var(--accent-text);}
  .sheet-actions .danger-btn{background:transparent;border-color:var(--danger);color:var(--danger);}

  .col-item{display:flex;align-items:center;gap:9px;padding:10px 0;font-size:14px;border-bottom:1px solid var(--line);}
  .col-item input{width:19px;height:19px;accent-color:var(--accent);}

  .action-list{display:flex;flex-direction:column;gap:2px;margin-top:2px;}
  .action-item{
    display:flex;align-items:center;gap:12px;padding:13px 10px;border-radius:10px;
    background:transparent;border:none;color:var(--ink);font-size:14px;text-align:right;width:100%;
  }
  .action-item:hover, .action-item:active{background:var(--panel2);}
  .action-item.danger{color:var(--danger);}
  .action-item .icn{flex-shrink:0;color:var(--ink-faint);}
  .action-item.danger .icn{color:var(--danger);}

  .section-title{font-size:12px;color:var(--ink-faint);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.04em;}
  .color-row{display:flex;align-items:center;gap:12px;margin:8px 0 6px;flex-wrap:wrap;}
  .swatches{display:flex;gap:11px;flex-wrap:wrap;}
  .swatch{width:36px;height:36px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;}
  .swatch.active{border-color:var(--ink);box-shadow:0 0 0 2px var(--bg);}
  .native-picker-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
  .native-picker-wrap span{font-size:9px;color:var(--ink-faint);}
  input[type=color]{
    width:40px;height:40px;border-radius:50%;border:2px solid var(--line2);padding:0;
    background:none;cursor:pointer;overflow:hidden;
  }
  input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:50%;}
  .theme-row{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 4px;align-items:center;}
  .theme-swatch{
    width:56px;height:44px;border-radius:9px;border:2px solid var(--line2);cursor:pointer;
    display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
  }
  .theme-swatch.active{border-color:var(--accent);}
  .theme-swatch i{flex:1;}

  .backup-row{display:flex;gap:8px;margin-top:6px;}
  .backup-row button{flex:1;padding:11px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;justify-content:center;gap:6px;
    border:1px solid var(--line2);background:var(--panel2);color:var(--ink);}

  .toast{
    position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--line2);color:var(--ink);
    padding:9px 16px;border-radius:9px;font-size:12.5px;
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:100;text-align:center;max-width:88%;
  }
  .toast.show{opacity:1;}

  #importFile{display:none;}

  /* ---- Immersive full viewer ---- */
  .lightbox{
    position:fixed;inset:0;background:#000;display:flex;
    align-items:center;justify-content:center;z-index:200;flex-direction:column;padding:0;
    opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s ease, visibility 0s linear .2s;
  }
  .lightbox.open{opacity:1;visibility:visible;pointer-events:auto;transition:opacity .2s ease;}
  .lightbox-top{
    width:100%;display:flex;justify-content:space-between;align-items:center;
    padding:14px 14px;position:absolute;top:0;left:0;right:0;z-index:2;
    background:linear-gradient(to bottom, rgba(0,0,0,.75), transparent);
  }
  .lightbox-title{color:#eee;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:40%;}
  .lightbox-actions{display:flex;gap:8px;align-items:center;}
  .lightbox-actions button{
    background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:50%;
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }
  .lightbox-actions button.active{color:var(--accent);}
  .lightbox-actions button.active svg{fill:currentColor;}
  .lightbox-close{background:rgba(255,255,255,.16) !important;}
  .lightbox-content{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .lightbox-content img, .lightbox-content video{max-width:100%;max-height:100%;}
  .lightbox-nav{
    position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);
    border:none;color:#fff;width:42px;height:42px;border-radius:50%;z-index:2;
    display:flex;align-items:center;justify-content:center;
  }
  .lightbox-nav-prev{left:12px;}
  .lightbox-nav-next{right:12px;}
  .lightbox-nav[disabled]{opacity:.2;pointer-events:none;}
  .lightbox-bottom{
    position:absolute;bottom:0;left:0;right:0;padding:16px;display:flex;justify-content:center;
    background:linear-gradient(to top, rgba(0,0,0,.75), transparent);
  }
  .lightbox-link{color:var(--accent);font-size:13px;background:none;border:none;text-decoration:underline;}

  /* ---- Sidebar drawer ---- */
  .sidebar-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:120;
    display:none;
  }
  .sidebar-overlay.open{display:block;}
  .sidebar{
    position:fixed;top:0;bottom:0;right:0;width:82%;max-width:320px;
    background:var(--panel);border-left:1px solid var(--line2);
    padding:18px 16px 20px;overflow-y:auto;
    transform:translateX(100%);transition:transform .25s ease;
  }
  .sidebar-overlay.open .sidebar{transform:translateX(0);}
  .sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .sidebar-header h2{margin:0;font-size:17px;font-weight:400;}
  .sidebar-stats{display:flex;gap:8px;margin-bottom:16px;}
  .sidebar-stats .stat{padding:9px 6px;}
  .sidebar-stats .stat b{font-size:16px;}
  .sidebar-nav{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
  .sidebar-nav button{
    display:flex;align-items:center;gap:10px;width:100%;text-align:right;
    background:transparent;border:none;color:var(--ink-dim);padding:11px 10px;border-radius:9px;font-size:14px;
  }
  .sidebar-nav button.active{background:var(--panel2);color:var(--ink);font-weight:600;}
  .sidebar-col-row{display:flex;align-items:center;gap:2px;}
  .sidebar-col-item{
    display:flex;align-items:center;gap:9px;flex:1;min-width:0;text-align:right;
    background:transparent;border:none;color:var(--ink-dim);padding:11px 10px;border-radius:9px;font-size:14px;
  }
  .sidebar-col-item.active{background:var(--panel2);color:var(--ink);font-weight:600;}
  .sidebar-col-item .sc-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sidebar-col-item .cnt{color:var(--ink-faint);font-size:11px;font-weight:400;flex-shrink:0;}
  .sidebar-col-more{
    background:transparent;border:none;color:var(--ink-faint);width:32px;height:38px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;border-radius:8px;
  }
  .sidebar-col-more:hover, .sidebar-col-more:active{background:var(--panel2);color:var(--ink);}
  .sidebar-add-col{
    width:100%;margin-top:6px;padding:10px;border-radius:9px;font-size:13px;text-align:center;
    border:1px dashed var(--line2);background:transparent;color:var(--ink-dim);
    display:flex;align-items:center;justify-content:center;gap:6px;
  }

  /* ---- Home page ---- */
  .home-section{margin-bottom:22px;}
  .home-section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .home-section-head h2{font-size:14px;font-weight:600;color:var(--ink-dim);margin:0;text-transform:uppercase;letter-spacing:.03em;}
  .see-all{font-size:12px;color:var(--accent);background:none;border:none;flex-shrink:0;}
  .col-pill-row{display:flex;gap:8px;flex-wrap:wrap;}
  .col-pill{
    background:var(--panel);border:1px solid var(--line);color:var(--ink);
    padding:10px 15px;border-radius:12px;font-size:13px;display:flex;align-items:center;gap:6px;
  }
  .col-pill span.cnt{color:var(--ink-faint);font-size:11px;}
  .col-pill-add{border-style:dashed;color:var(--ink-dim);}
  .page-title{font-size:18px;font-weight:400;margin:0 0 14px;color:var(--ink);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="icon-btn" id="btnMenu" aria-label="القائمة"></button>
    <div class="brand">
      <h1 class="serif" id="pageHeading">الأرشيف</h1>
      <p id="pageSub">معرضك الدائم — لا يضيع مع تبديل الحسابات</p>
    </div>
    <button class="icon-btn" id="btnSettings" aria-label="المظهر"></button>
  </header>

  <!-- HOME VIEW -->
  <div id="homeView">
    <div class="stats">
      <div class="stat"><b id="statTotal">0</b><span>عناصر</span></div>
      <div class="stat"><b id="statFav">0</b><span>مفضلة</span></div>
      <div class="stat"><b id="statCol">0</b><span>قوائم</span></div>
    </div>

    <div class="home-section">
      <div class="home-section-head">
        <h2>القوائم الرئيسية</h2>
        <button class="see-all" data-view="all">كل العناصر ›</button>
      </div>
      <div class="col-pill-row" id="homeCollections"></div>
    </div>

    <div class="home-section">
      <div class="home-section-head">
        <h2>★ المفضلة</h2>
        <button class="see-all" data-view="fav">عرض الكل ›</button>
      </div>
      <div id="homeFavGrid"></div>
    </div>

    <div class="home-section">
      <div class="home-section-head">
        <h2>أحدث الإضافات</h2>
        <button class="see-all" data-view="all">عرض الكل ›</button>
      </div>
      <div id="homeRecentGrid"></div>
    </div>
  </div>

  <!-- LIST VIEW (all / fav / collection) -->
  <div id="listView" style="display:none;">
    <h2 class="page-title" id="listTitle"></h2>
    <div class="toolbar">
      <input class="search" id="searchBox" placeholder="ابحث بالعنوان أو القائمة...">
      <select class="sort-select" id="sortSelect">
        <option value="newest">الأحدث</option>
        <option value="oldest">الأقدم</option>
        <option value="name">أبجدي</option>
        <option value="fav">المفضلة أولاً</option>
      </select>
      <button class="icon-btn small" id="btnDensity" aria-label="حجم الشبكة"></button>
    </div>
    <div class="filters" id="typeFilters">
      <button class="chip active" data-type="all">الكل</button>
      <button class="chip" data-type="image">صور</button>
      <button class="chip" data-type="video">فيديو</button>
    </div>
    <div id="gridArea"></div>
  </div>
</div>

<div class="fab-row">
  <button class="fab-secondary" id="btnSelectMode">تحديد</button>
  <button class="fab" id="btnOpenAdd"></button>
</div>

<!-- SIDEBAR -->
<div class="sidebar-overlay" id="sidebarOverlay">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 class="serif">التصفح</h2>
      <button class="icon-btn" id="btnCloseSidebar" aria-label="إغلاق"></button>
    </div>
    <div class="sidebar-stats">

function icon(name, size, solid){
  size = size || 18;
  return '<svg class="icn' + (solid ? ' icn-solid' : '') + '" width="' + size + '" height="' + size +
    '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
    (ICONS[name] || '') + '</svg>';
}

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

/* ---------- Theme engine ---------- */
function hexToRgb(hex){
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
function rgbToHex(r,g,b){
  const c = v => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');
  return '#' + c(r) + c(g) + c(b);
}
function mixHex(hex, target, amt){
  const a = hexToRgb(hex), b = hexToRgb(target);
  return rgbToHex(a.r + (b.r-a.r)*amt, a.g + (b.g-a.g)*amt, a.b + (b.b-a.b)*amt);
}
function isLight(hex){
  const {r,g,b} = hexToRgb(hex);
  return (r*299+g*587+b*114)/1000 > 150;
}
function hexToDim(hex){ return mixHex(hex, '#000000', 0.35); }

function applyAccent(hex, skipSave){
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-dim', hexToDim(hex));
  document.documentElement.style.setProperty('--accent-text', isLight(hex) ? '#1a1a1a' : '#fff8ec');
  if(!skipSave) localStorage.setItem('archive-accent', hex);
  document.getElementById('accentColorPicker').value = hex;
  renderSwatches(hex);
}

function buildThemeFromBase(baseHex){
  const light = isLight(baseHex);
  if(!light){
    return {
      bg: baseHex,
      panel: mixHex(baseHex,'#ffffff',0.07),
      panel2: mixHex(baseHex,'#ffffff',0.14),
      line: mixHex(baseHex,'#ffffff',0.22),
      line2: mixHex(baseHex,'#ffffff',0.32),
      ink: '#f5f0e6', inkDim: '#b3ab9a', inkFaint: '#7d7566'
    };
  }else{
    return {
      bg: baseHex,
      panel: mixHex(baseHex,'#000000',0.03),
      panel2: mixHex(baseHex,'#000000',0.07),
      line: mixHex(baseHex,'#000000',0.15),
      line2: mixHex(baseHex,'#000000',0.26),
      ink: '#201c14', inkDim: '#5c564a', inkFaint: '#8a8371'
    };
  }
}

function applyThemeObj(t){
  document.documentElement.style.setProperty('--bg', t.bg);
  document.documentElement.style.setProperty('--panel', t.panel);
  document.documentElement.style.setProperty('--panel2', t.panel2);
  document.documentElement.style.setProperty('--line', t.line);
  document.documentElement.style.setProperty('--line2', t.line2);
  document.documentElement.style.setProperty('--ink', t.ink);
  document.documentElement.style.setProperty('--ink-dim', t.inkDim);
  document.documentElement.style.setProperty('--ink-faint', t.inkFaint);
  const meta = document.getElementById('themeColorMeta');
  if(meta) meta.setAttribute('content', t.bg);
}

function applyTheme(baseHex, skipSave){
  const t = buildThemeFromBase(baseHex);
  applyThemeObj(t);
  if(!skipSave) localStorage.setItem('archive-bg', baseHex);
  document.getElementById('bgColorPicker').value = baseHex;
  renderThemeRow(baseHex);
}

function renderThemeRow(activeBase){
  const wrap = document.getElementById('themeRow');
  wrap.querySelectorAll('.theme-swatch').forEach(el=>el.remove());
  const pickerWrap = wrap.querySelector('.native-picker-wrap');
  Object.keys(THEMES).forEach(key=>{
    const t = THEMES[key];
    const el = document.createElement('div');
    el.className = 'theme-swatch' + (t.bg.toLowerCase()===(activeBase||'').toLowerCase() ? ' active' : '');
    el.style.background = t.bg;
    el.title = t.name;
    el.addEventListener('click', ()=>applyTheme(t.bg));
    wrap.insertBefore(el, pickerWrap);
  });
}

function renderSwatches(activeHex){
  const wrap = document.getElementById('swatches');
  wrap.innerHTML = '';
  PRESET_COLORS.forEach(hex=>{
    const s = document.createElement('div');
    s.className = 'swatch' + (hex.toLowerCase()===(activeHex||'').toLowerCase() ? ' active' : '');
    s.style.background = hex;
    s.addEventListener('click', ()=>applyAccent(hex));
    wrap.appendChild(s);
  });
}

/* ---------- Grid density ---------- */
function applyGridDensity(){
  document.documentElement.style.setProperty('--grid-min', gridDensity==='compact' ? '108px' : '150px');

}
function toggleGridDensity(){
  gridDensity = gridDensity==='compact' ? 'comfortable' : 'compact';
  localStorage.setItem('archive-grid-density', gridDensity);

/* ---------- Toast ---------- */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------- Custom dialogs (replace confirm/prompt) ---------- */
function confirmDialog(opts){
  document.getElementById('confirmTitle').textContent = opts.title || '';
  document.getElementById('confirmMsg').textContent = opts.message || '';
  document.getElementById('confirmCancelBtn').textContent = opts.cancelLabel || 'إلغاء';
  const oldOk = document.getElementById('confirmOkBtn');
  oldOk.textContent = opts.okLabel || 'تأكيد';
  oldOk.className = opts.danger === false ? 'primary' : 'danger-btn';
  const newOk = oldOk.cloneNode(true);
  oldOk.parentNode.replaceChild(newOk, oldOk);
  newOk.addEventListener('click', ()=>{
    closeSheet('confirmSheetBg');
    if(opts.onConfirm) opts.onConfirm();
  });
  openSheet('confirmSheetBg');
}

function promptDialog(opts){
  document.getElementById('promptTitle').textContent = opts.title || '';
  const input = document.getElementById('promptInput');
  input.placeholder = opts.placeholder || '';
  input.value = opts.value || '';
  const oldOk = document.getElementById('promptOkBtn');
  oldOk.textContent = opts.okLabel || 'حفظ';
  const newOk = oldOk.cloneNode(true);
  oldOk.parentNode.replaceChild(newOk, oldOk);
  const submit = ()=>{
    const v = input.value.trim();
    if(!v) return;
    closeSheet('promptSheetBg');
    if(opts.onSubmit) opts.onSubmit(v);
  };
  newOk.addEventListener('click', submit);
  input.onkeydown = (e)=>{ if(e.key === 'Enter') submit(); };
  openSheet('promptSheetBg');
  setTimeout(()=>input.focus(), 60);
}

function openActionSheet(title, actions){
  document.getElementById('actionSheetTitle').textContent = title;
  const list = document.getElementById('actionSheetList');
  list.innerHTML = '';
  actions.forEach(a=>{
    const b = document.createElement('button');
    b.className = 'action-item' + (a.danger ? ' danger' : '');
    b.innerHTML = icon(a.icon, 19) + '<span>' + escapeHtml(a.label) + '</span>';
    b.addEventListener('click', ()=>{
      closeSheet('actionSheetBg');
      if(a.onClick) a.onClick();
    });
    list.appendChild(b);
  });
  openSheet('actionSheetBg');
}

/* ---------- Copy link ---------- */
function copyLink(url){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(()=>showToast('تم نسخ الرابط')).catch(()=>fallbackCopy(url));
  }else{
    fallbackCopy(url);
  }
}
function fallbackCopy(url){
  const ta = document.createElement('textarea');
  ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); showToast('تم نسخ الرابط'); }
  catch(e){ showToast('تعذر نسخ الرابط'); }
  document.body.removeChild(ta);
}

/* ---------- Utilities ---------- */
function detectType(url){
  const u = url.toLowerCase().split('?')[0];
  if(u.match(/\.(mp4|webm|mov|m4v)$/)) return 'video';
  return 'image';
}
function formatRelative(ts){
  const diff = Date.now() - ts;
  const min = 60000, hr = 3600000, day = 86400000;
  if(diff < min) return 'الآن';
  if(diff < hr) return 'قبل ' + Math.floor(diff/min) + ' د';
  if(diff < day) return 'قبل ' + Math.floor(diff/hr) + ' س';
  const days = Math.floor(diff/day);
  if(days < 30) return 'قبل ' + days + (days===1 ? ' يوم' : ' أيام');
  const months = Math.floor(days/30);
  if(months < 12) return 'قبل ' + months + ' شهر';
  return 'قبل ' + Math.floor(months/12) + ' سنة';
}
function catalogNo(id){
  const sorted = [...items].sort((a,b)=>a.createdAt-b.createdAt);
  const idx = sorted.findIndex(i=>i.id===id);
  return String(idx+1).padStart(3,'0');
}

/* ---------- Persistence ---------- */
function loadData(){
  try{ items = JSON.parse(localStorage.getItem('archive-items') || '[]'); }catch(e){ items = []; }
  try{ collections = JSON.parse(localStorage.getItem('archive-collections') || '[]'); }catch(e){ collections = []; }
  gridDensity = localStorage.getItem('archive-grid-density') || 'comfortable';
  const savedColor = localStorage.getItem('archive-accent') || '#e0a640';
  const savedBg = localStorage.getItem('archive-bg') || THEMES.warm.bg;
  applyAccent(savedColor, true);
  applyTheme(savedBg, true);
  applyGridDensity();
  mountStaticIcons();
  render();
}

function saveCollections(){ localStorage.setItem('archive-collections', JSON.stringify(collections)); }

function addItem(){
  const raw = document.getElementById('inUrl').value;
  const lines = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(lines.length === 0){ showToast('الصق رابطاً واحداً على الأقل'); return; }
  const typeSel = document.getElementById('inType').value;
  const titleInput = document.getElementById('inTitle').value.trim();
  const now = Date.now();
  const newItems = lines.map((url, idx)=>{
    const type = typeSel === 'auto' ? detectType(url) : typeSel;
    const title = (lines.length === 1 && titleInput) ? titleInput : 'بدون عنوان';
    return {
      id: 'm' + now + '_' + idx + '_' + Math.floor(Math.random()*100000),
      url, type, title, favorite:false, collections:[], createdAt: now + idx
    };
  });
  items = [...newItems.reverse(), ...items];
  document.getElementById('inUrl').value = '';
  document.getElementById('inTitle').value = '';
  saveItems();
  closeSheet('addSheetBg');
  render();
  showToast(lines.length > 1 ? ('تمت إضافة ' + lines.length + ' عناصر') : 'تم الحفظ في الأرشيف');
}

function openEditSheet(id){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  editItemId = id;
  document.getElementById('editUrl').value = it.url;
  document.getElementById('editType').value = it.type;
  document.getElementById('editTitle').value = it.title;
  openSheet('editSheetBg');
}
function saveEdit(){
  const it = items.find(i=>i.id===editItemId);
  if(!it) return;
  const url = document.getElementById('editUrl').value.trim();
  if(!url){ showToast('الرابط مطلوب'); return; }
  it.url = url;
  it.type = document.getElementById('editType').value;
  it.title = document.getElementById('editTitle').value.trim() || 'بدون عنوان';
  saveItems();
  closeSheet('editSheetBg');
  render();
  showToast('تم حفظ التعديلات');
}

function toggleFav(id){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  it.favorite = !it.favorite;
  saveItems();
  render();
  if(lightboxItemId === id) syncLightboxFavButton();
}
function deleteItem(id){
  items = items.filter(i=>i.id!==id);
  selectedIds.delete(id);
  if(lightboxItemId === id) closeLightbox();
  saveItems();
  render();
  showToast('تم الحذف');
}

function openItemActionSheet(it){
  openActionSheet(it.title, [
    {icon:'edit', label:'تعديل التفاصيل', onClick:()=>openEditSheet(it.id)},
    {icon:'folder', label:'إدارة القوائم', onClick:()=>openCollectionModal(it.id)},
    {icon:'link', label:'نسخ الرابط', onClick:()=>copyLink(it.url)},
    {icon:'externalLink', label:'فتح الرابط الأصلي', onClick:()=>window.open(it.url,'_blank')},
    {icon:'trash', label:'حذف العنصر', danger:true, onClick:()=>confirmDialog({
      title:'حذف هذا العنصر؟',
      message:'سيُحذف نهائيًا من الأرشيف.',
      okLabel:'حذف',
      onConfirm:()=>deleteItem(it.id)
    })}
  ]);
}

/* ---------- Sheets open/close ---------- */
function openSheet(id){ document.getElementById(id).classList.add('open'); }
function closeSheet(id){ document.getElementById(id).classList.remove('open'); }

/* ---------- Sidebar ---------- */
function openSidebar(){ renderSidebar(); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar(){ document.getElementById('sidebarOverlay').classList.remove('open'); }

function renderSidebar(){
  document.getElementById('sbStatTotal').textContent = items.length;
  document.getElementById('sbStatFav').textContent = items.filter(i=>i.favorite).length;
  document.getElementById('sbStatCol').textContent = collections.length;

  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  [
    {v:'home', label:'الرئيسية', ic:'home'},
    {v:'all', label:'كل العناصر', ic:'gridLarge'},
    {v:'fav', label:'المفضلة', ic:'star'}
  ].forEach(o=>{
    const b = document.createElement('button');
    b.innerHTML = icon(o.ic,17) + '<span>' + o.label + '</span>';
    if(currentView === o.v) b.classList.add('active');
    b.addEventListener('click', ()=>navigate(o.v));
    nav.appendChild(b);
  });

  const colWrap = document.getElementById('sidebarCollections');
  colWrap.innerHTML = '';
  if(collections.length === 0){
    colWrap.innerHTML = '<p class="hint-text">لا توجد قوائم بعد.</p>';
  }
  collections.forEach(col=>{
    const count = items.filter(i=>i.collections.includes(col)).length;
    const row = document.createElement('div');
    row.className = 'sidebar-col-row';
    const navBtn = document.createElement('button');
    navBtn.className = 'sidebar-col-item' + (currentView === 'col:'+col ? ' active' : '');
    navBtn.innerHTML = icon('folder',15) + '<span class="sc-name">' + escapeHtml(col) + '</span><span class="cnt">' + count + '</span>';
    navBtn.addEventListener('click', ()=>navigate('col:'+col));
    const moreBtn = document.createElement('button');
    moreBtn.className = 'sidebar-col-more';
    moreBtn.innerHTML = icon('more',15);
    moreBtn.setAttribute('aria-label','خيارات القائمة');
    moreBtn.addEventListener('click', ()=>openCollectionActionSheet(col));
    row.appendChild(navBtn);
    row.appendChild(moreBtn);
    colWrap.appendChild(row);
  });
}

function openCollectionActionSheet(col){
  openActionSheet(col, [
    {icon:'edit', label:'إعادة تسمية', onClick:()=>promptDialog({
      title:'إعادة تسمية القائمة',
      value:col,
      okLabel:'حفظ',
      onSubmit:(newName)=>renameCollection(col, newName)
    })},
    {icon:'trash', label:'حذف القائمة', danger:true, onClick:()=>confirmDialog({
      title:'حذف قائمة "' + col + '"؟',
      message:'ستُزال من كل العناصر، ولن تُحذف العناصر نفسها.',
      okLabel:'حذف',
      onConfirm:()=>deleteCollection(col)
    })}
  ]);
}

function renameCollection(oldName, newName){
  newName = newName.trim();
  if(!newName || newName === oldName) return;
  if(collections.includes(newName)){ showToast('توجد قائمة بهذا الاسم بالفعل'); return; }
  collections = collections.map(c => c === oldName ? newName : c);
  items.forEach(it=>{ it.collections = it.collections.map(c => c === oldName ? newName : c); });
  if(currentView === 'col:'+oldName) currentView = 'col:'+newName;
  saveCollections(); saveItems(); render();
  showToast('تم تحديث اسم القائمة');
}
function deleteCollection(name){
  collections = collections.filter(c => c !== name);
  items.forEach(it=>{ it.collections = it.collections.filter(c => c !== name); });
  if(currentView === 'col:'+name) currentView = 'all';
  saveCollections(); saveItems(); render();
  showToast('تم حذف القائمة');
}
function createStandaloneCollection(){
  promptDialog({
    title:'قائمة جديدة',
    placeholder:'اسم القائمة',
    okLabel:'إنشاء',
    onSubmit:(name)=>{
      if(collections.includes(name)){ showToast('هذه القائمة موجودة بالفعل'); return; }
      collections.push(name);
      saveCollections();
      render();
      showToast('تم إنشاء القائمة: ' + name);
    }
  });
}

function navigate(view){
  currentView = view;
  searchTerm = '';
  typeFilter = 'all';
  const sb = document.getElementById('searchBox');
  if(sb) sb.value = '';
  document.querySelectorAll('#typeFilters .chip').forEach(c=>c.classList.toggle('active', c.dataset.type === 'all'));
  closeSidebar();
  render();
  window.scrollTo(0,0);
}

/* ---------- Lightbox / immersive viewer ---------- */
function showLightboxItem(id){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  lightboxItemId = id;
  lightboxIndex = lightboxNavList.indexOf(id);
  const content = document.getElementById('lightboxContent');
  const prevVideo = content.querySelector('video');
  if(prevVideo) prevVideo.pause();
  content.innerHTML = it.type === 'video'
    ? '<video src="' + escapeHtml(it.url) + '" controls autoplay playsinline></video>'
    : '<img src="' + escapeHtml(it.url) + '" alt="' + escapeHtml(it.title) + '">';
  document.getElementById('lightboxTitle').textContent = it.title;
  document.getElementById('lightboxLink').onclick = ()=>window.open(it.url,'_blank');
  document.getElementById('lightboxCopy').onclick = ()=>copyLink(it.url);
  syncLightboxFavButton();
  updateLightboxNavButtons();
}
function openLightboxById(id, navList){
  lightboxNavList = navList && navList.length ? navList : [id];
  showLightboxItem(id);
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  if(lb.requestFullscreen){ lb.requestFullscreen().catch(()=>{}); }
  else if(lb.webkitRequestFullscreen){ lb.webkitRequestFullscreen(); }
}
function updateLightboxNavButtons(){
  const prevBtn = document.getElementById('lightboxPrev');
  const nextBtn = document.getElementById('lightboxNext');
  const show = lightboxNavList.length > 1;
  prevBtn.style.display = show ? 'flex' : 'none';
  nextBtn.style.display = show ? 'flex' : 'none';
  prevBtn.disabled = lightboxIndex <= 0;
  nextBtn.disabled = lightboxIndex >= lightboxNavList.length - 1;
}
function lightboxPrev(){ if(lightboxIndex > 0) showLightboxItem(lightboxNavList[lightboxIndex-1]); }
function lightboxNext(){ if(lightboxIndex < lightboxNavList.length-1) showLightboxItem(lightboxNavList[lightboxIndex+1]); }
function syncLightboxFavButton(){
  const it = items.find(i=>i.id===lightboxItemId);
  const btn = document.getElementById('lightboxFav');
  if(it && it.favorite) btn.classList.add('active'); else btn.classList.remove('active');
}
function closeLightbox(){
  if(document.fullscreenElement){ document.exitFullscreen().catch(()=>{}); }
  else if(document.webkitFullscreenElement && document.webkitExitFullscreen){ document.webkitExitFullscreen(); }
  const content = document.getElementById('lightboxContent');
  const v = content.querySelector('video');
  if(v) v.pause();
  content.innerHTML = '';
  document.getElementById('lightbox').classList.remove('open');
  lightboxItemId = null;
  lightboxNavList = [];
  lightboxIndex = -1;
}
function toggleLightboxFullscreen(){
  const lb = document.getElementById('lightbox');
  if(document.fullscreenElement || document.webkitFullscreenElement){
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  }else{
    if(lb.requestFullscreen) lb.requestFullscreen().catch(()=>{});
    else if(lb.webkitRequestFullscreen) lb.webkitRequestFullscreen();
  }
}
document.addEventListener('fullscreenchange', ()=>{
  if(!document.fullscreenElement && document.getElementById('lightbox').classList.contains('open')){
    closeLightbox();
  }
});
document.addEventListener('keydown', (e)=>{
  const lb = document.getElementById('lightbox');
  if(!lb.classList.contains('open')) return;
  if(e.key === 'Escape') closeLightbox();
  else if(e.key === 'ArrowRight') lightboxNext();
  else if(e.key === 'ArrowLeft') lightboxPrev();
});
(function wireSwipe(){
  let touchStartX = null;
  const el = document.getElementById('lightboxContent');
  el.addEventListener('touchstart', e=>{ touchStartX = e.changedTouches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', e=>{
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 50){ if(dx < 0) lightboxNext(); else lightboxPrev(); }
    touchStartX = null;
  }, {passive:true});
})();

/* ---------- Collections modal (single or bulk target) ---------- */
function openCollectionModal(idOrIds){
  modalItemIds = Array.isArray(idOrIds) ? idOrIds.slice() : [idOrIds];
  renderColList();
  openSheet('collectionSheetBg');
}
function renderColList(){
  const wrap = document.getElementById('colList');
  wrap.innerHTML = '';
  const targets = modalItemIds.map(id=>items.find(i=>i.id===id)).filter(Boolean);
  if(targets.length === 0) return;
  if(collections.length === 0){
    wrap.innerHTML = '<p class="hint-text">لا توجد قوائم بعد.</p>';
  }
  collections.forEach(col=>{
    const row = document.createElement('div');
    row.className = 'col-item';
    const checked = targets.every(t=>t.collections.includes(col));
    row.innerHTML = '<input type="checkbox" ' + (checked ? 'checked' : '') + '> <span>' + escapeHtml(col) + '</span>';
    row.querySelector('input').addEventListener('change', (e)=>{
      if(e.target.checked){
        targets.forEach(t=>{ if(!t.collections.includes(col)) t.collections.push(col); });
      }else{
        targets.forEach(t=>{ t.collections = t.collections.filter(c=>c!==col); });
      }
      saveItems();
      render();
    });
    wrap.appendChild(row);
  });
}
function createCollectionAndAdd(){
  const name = document.getElementById('newColName').value.trim();
  if(!name) return;
  if(!collections.includes(name)) collections.push(name);
  const targets = modalItemIds.map(id=>items.find(i=>i.id===id)).filter(Boolean);
  targets.forEach(t=>{ if(!t.collections.includes(name)) t.collections.push(name); });
  document.getElementById('newColName').value = '';
  saveCollections();
  saveItems();
  renderColList();
  render();
  showToast('تم إنشاء القائمة');
}

/* ---------- Card building (shared by list view & home previews) ---------- */
function buildCard(it, opts){
  opts = opts || {};
  const compact = !!opts.compact;
  const navList = opts.navList || [it.id];
  const card = document.createElement('div');
  card.className = 'card' + (selectedIds.has(it.id) ? ' selected' : '');
  const media = it.type === 'video'
    ? '<video src="' + escapeHtml(it.url) + '" muted playsinline preload="metadata"></video>'
    : '<img src="' + escapeHtml(it.url) + '" loading="lazy" alt="">';
  card.innerHTML =
    '<div class="thumb loading">' +
      media +
      (it.type === 'video' ? '<div class="play-hint">' + icon('play',30,true) + '</div>' : '') +
      '<button class="fav-btn ' + (it.favorite ? 'active' : '') + '" title="مفضلة" aria-label="مفضلة">' + icon('star',15) + '</button>' +
      '<div class="select-box ' + (selectedIds.has(it.id) ? 'checked' : '') + '">' + (selectedIds.has(it.id) ? icon('check',13) : '') + '</div>' +
      '<span class="type-badge">' + icon(it.type === 'video' ? 'video' : 'image', 11, true) + '<span>' + (it.type === 'video' ? 'فيديو' : 'صورة') + '</span></span>' +
    '</div>' +
    (compact ? '' :
    '<div class="card-body">' +
      '<div class="card-title">' + escapeHtml(it.title) + '</div>' +
      '<div class="card-meta mono">No. ' + catalogNo(it.id) + ' · ' + formatRelative(it.createdAt) + '</div>' +
      '<div class="card-tags">' + it.collections.map(c=>'<span class="tag">' + escapeHtml(c) + '</span>').join('') + '</div>' +
      '<div class="card-actions">' +
        '<button class="btn-view">' + icon('play',13,true) + '<span>عرض</span></button>' +
        '<button class="btn-more" aria-label="خيارات">' + icon('more',16) + '</button>' +
      '</div>' +
    '</div>');

  const thumb = card.querySelector('.thumb');
  const mediaEl = thumb.querySelector('img, video');
  if(mediaEl){
    const done = ()=>thumb.classList.remove('loading');
    if(mediaEl.tagName === 'IMG'){
      mediaEl.addEventListener('load', done);
      if(mediaEl.complete) done();
    }else{
      mediaEl.addEventListener('loadeddata', done);
    }
    mediaEl.addEventListener('error', ()=>{
      thumb.classList.remove('loading');
      thumb.classList.add('thumb-error');
      const ph = document.createElement('div');
      ph.className = 'thumb-placeholder';
      ph.innerHTML = icon('image',26);
      mediaEl.replaceWith(ph);
    });
  }

  if(!compact && selectMode){
    card.addEventListener('click', ()=>toggleSelect(it.id));
  }else{
    thumb.addEventListener('click', ()=>openLightboxById(it.id, navList));
    card.querySelector('.fav-btn').addEventListener('click', (e)=>{ e.stopPropagation(); toggleFav(it.id); });
    if(!compact){
      card.querySelector('.btn-view').addEventListener('click', ()=>openLightboxById(it.id, navList));
      card.querySelector('.btn-more').addEventListener('click', ()=>openItemActionSheet(it));
    }
  }
  return card;
}

/* ---------- Select mode ---------- */
function toggleSelect(id){
  if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  render();
  document.getElementById('selectCountTitle').textContent = selectedIds.size + ' محدد';
  if(selectedIds.size > 0) openSheet('selectSheetBg'); else closeSheet('selectSheetBg');
}
function enterSelectMode(){
  if(currentView === 'home') navigate('all');
  selectMode = true; selectedIds.clear();
  document.getElementById('btnOpenAdd').style.display = 'none';
  document.getElementById('btnSelectMode').textContent = 'إلغاء';
  render();
}
function exitSelectMode(){
  selectMode = false; selectedIds.clear();
  document.getElementById('btnOpenAdd').style.display = '';
  document.getElementById('btnSelectMode').textContent = 'تحديد';
  render();
}

/* ---------- Backup ---------- */
function exportBackup(){
  const data = JSON.stringify({items, collections}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'archive-backup.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('تم تجهيز ملف النسخة الاحتياطية');
}
function importBackup(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(Array.isArray(data.items)){
        const existingIds = new Set(items.map(i=>i.id));
        data.items.forEach(it=>{ if(!existingIds.has(it.id)) items.push(it); });
      }
      if(Array.isArray(data.collections)){
        data.collections.forEach(c=>{ if(!collections.includes(c)) collections.push(c); });
      }
      saveItems(); saveCollections(); render();
      showToast('تم استيراد النسخة الاحتياطية');
    }catch(err){ showToast('ملف غير صالح'); }
  };
  reader.readAsText(file);
}

/* ---------- Rendering ---------- */
function sortItems(list){
  const l = [...list];
  if(sortMode === 'newest') l.sort((a,b)=>b.createdAt-a.createdAt);
  else if(sortMode === 'oldest') l.sort((a,b)=>a.createdAt-b.createdAt);
  else if(sortMode === 'name') l.sort((a,b)=>a.title.localeCompare(b.title,'ar'));
  else if(sortMode === 'fav') l.sort((a,b)=>(b.favorite - a.favorite) || (b.createdAt-a.createdAt));
  return l;
}

function renderHome(){
  document.getElementById('statTotal').textContent = items.length;
  document.getElementById('statFav').textContent = items.filter(i=>i.favorite).length;
  document.getElementById('statCol').textContent = collections.length;

  const colWrap = document.getElementById('homeCollections');
  colWrap.innerHTML = '';
  collections.forEach(col=>{
    const count = items.filter(i=>i.collections.includes(col)).length;
    const b = document.createElement('button');
    b.className = 'col-pill';
    b.innerHTML = icon('folder',14) + '<span>' + escapeHtml(col) + '</span><span class="cnt">' + count + '</span>';
    b.addEventListener('click', ()=>navigate('col:'+col));
    colWrap.appendChild(b);
  });
  const addPill = document.createElement('button');
  addPill.className = 'col-pill col-pill-add';
  addPill.innerHTML = icon('plus',13) + '<span>قائمة جديدة</span>';
  addPill.addEventListener('click', createStandaloneCollection);
  colWrap.appendChild(addPill);

  const favGrid = document.getElementById('homeFavGrid');
  const favs = sortItems(items.filter(i=>i.favorite)).slice(0,8);
  if(favs.length === 0){
    favGrid.innerHTML = '<div class="empty" style="padding:24px 10px;"><div class="empty-icon">' + icon('star',40) + '</div><p>لا توجد عناصر مفضلة بعد. اضغط ★ على أي عنصر لإضافته هنا.</p></div>';
  }else{
    const favList = favs.map(i=>i.id);
    const grid = document.createElement('div');
    grid.className = 'grid';
    favs.forEach(it=> grid.appendChild(buildCard(it, {compact:true, navList:favList})) );
    favGrid.innerHTML = '';
    favGrid.appendChild(grid);
  }

  const recentGrid = document.getElementById('homeRecentGrid');
  const recents = [...items].sort((a,b)=>b.createdAt-a.createdAt).slice(0,8);
  if(recents.length === 0){
    recentGrid.innerHTML = '<div class="empty" style="padding:24px 10px;"><p>ابدأ بإضافة أول عنصر لأرشيفك.</p></div>';
  }else{
    const recentList = recents.map(i=>i.id);
    const grid = document.createElement('div');
    grid.className = 'grid';
    recents.forEach(it=> grid.appendChild(buildCard(it, {compact:true, navList:recentList})) );
    recentGrid.innerHTML = '';
    recentGrid.appendChild(grid);
  }
}

function renderList(){
  let title = '';
  let baseList = items;
  if(currentView === 'all'){ title = 'كل العناصر'; }
  else if(currentView === 'fav'){ title = '★ المفضلة'; baseList = items.filter(i=>i.favorite); }
  else if(currentView.startsWith('col:')){
    const name = currentView.slice(4);
    title = name;
    baseList = items.filter(i=>i.collections.includes(name));
  }
  document.getElementById('listTitle').textContent = title;

  const hadAnyBeforeFilters = baseList.length > 0;
  let list = baseList;
  if(typeFilter !== 'all') list = list.filter(i=>i.type === typeFilter);
  if(searchTerm){
    const q = searchTerm.toLowerCase();
    list = list.filter(i => i.title.toLowerCase().includes(q) || i.collections.some(c=>c.toLowerCase().includes(q)));
  }
  list = sortItems(list);

  const area = document.getElementById('gridArea');
  if(list.length === 0){
    if(!hadAnyBeforeFilters){
      area.innerHTML = '<div class="empty"><div class="empty-icon">' + icon('image',48) + '</div><h3 class="serif">لا شيء هنا بعد</h3><p>الصق رابط صورة أو فيديو فوق لحفظه بشكل دائم.</p></div>';
    }else{
      area.innerHTML = '<div class="empty"><div class="empty-icon">' + icon('search',48) + '</div><h3 class="serif">لا نتائج مطابقة</h3><p>جرّب كلمة بحث أو فلترة مختلفة.</p></div>';
    }
    return;
  }
  const navList = list.map(i=>i.id);
  const grid = document.createElement('div');
  grid.className = 'grid' + (selectMode ? ' select-mode' : '');
  list.forEach(it=> grid.appendChild(buildCard(it, {navList})) );
  area.innerHTML = '';
  area.appendChild(grid);
}

function render(){
  const isHome = currentView === 'home';
  document.getElementById('homeView').style.display = isHome ? '' : 'none';
  document.getElementById('listView').style.display = isHome ? 'none' : '';

  document.getElementById('pageHeading').textContent = isHome ? 'الأرشيف' : (
    currentView === 'all' ? 'كل العناصر' :
    currentView === 'fav' ? 'المفضلة' :
    currentView.startsWith('col:') ? currentView.slice(4) : 'الأرشيف'
  );
  document.getElementById('pageSub').textContent = isHome
    ? 'معرضك الدائم — لا يضيع مع تبديل الحسابات'
    : (items.length + ' عنصر في الأرشيف');

  if(isHome) renderHome(); else renderList();
  renderSidebar();
}

/* ---------- Event wiring ---------- */
document.getElementById('btnMenu').addEventListener('click', openSidebar);
document.getElementById('btnCloseSidebar').addEventListener('click', closeSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'sidebarOverlay') closeSidebar();
});
document.getElementById('btnSidebarAddCol').addEventListener('click', createStandaloneCollection);

document.getElementById('homeView').addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-view]');
  if(btn) navigate(btn.dataset.view);
});

document.getElementById('btnOpenAdd').addEventListener('click', ()=>openSheet('addSheetBg'));
document.getElementById('btnCancelAdd').addEventListener('click', ()=>closeSheet('addSheetBg'));
document.getElementById('btnAdd').addEventListener('click', addItem);
document.getElementById('btnCancelEdit').addEventListener('click', ()=>closeSheet('editSheetBg'));
document.getElementById('btnSaveEdit').addEventListener('click', saveEdit);

document.getElementById('searchBox').addEventListener('input', e=>{ searchTerm = e.target.value; renderList(); });
document.getElementById('sortSelect').addEventListener('change', e=>{ sortMode = e.target.value; renderList(); });
document.getElementById('btnDensity').addEventListener('click', ()=>{ toggleGridDensity(); renderList(); });
document.getElementById('btnDensitySettings').addEventListener('click', ()=>{ toggleGridDensity(); if(currentView!=='home') renderList(); });
document.getElementById('typeFilters').addEventListener('click', e=>{
  const btn = e.target.closest('.chip');
  if(!btn) return;
  typeFilter = btn.dataset.type;
  document.querySelectorAll('#typeFilters .chip').forEach(c=>c.classList.toggle('active', c===btn));
  renderList();
});

document.getElementById('btnCloseColSheet').addEventListener('click', ()=>closeSheet('collectionSheetBg'));
document.getElementById('btnCreateCol').addEventListener('click', createCollectionAndAdd);

document.getElementById('btnSettings').addEventListener('click', ()=>openSheet('settingsSheetBg'));
document.getElementById('btnCloseSettings').addEventListener('click', ()=>closeSheet('settingsSheetBg'));
document.getElementById('accentColorPicker').addEventListener('input', (e)=>applyAccent(e.target.value));
document.getElementById('bgColorPicker').addEventListener('input', (e)=>applyTheme(e.target.value));

document.getElementById('btnSelectMode').addEventListener('click', ()=>{
  if(selectMode) exitSelectMode(); else enterSelectMode();
});
document.getElementById('btnCancelSelect').addEventListener('click', ()=>{ closeSheet('selectSheetBg'); exitSelectMode(); });
document.getElementById('btnBulkAddCol').addEventListener('click', ()=>{
  if(selectedIds.size === 0) return;
  openCollectionModal(Array.from(selectedIds));
});
document.getElementById('btnDeleteSelected').addEventListener('click', ()=>{
  if(selectedIds.size === 0) return;
  const n = selectedIds.size;
  confirmDialog({
    title:'حذف ' + n + ' عنصر؟',
    message:'لا يمكن التراجع عن هذا الإجراء.',
    okLabel:'حذف',
    onConfirm:()=>{
      items = items.filter(i=>!selectedIds.has(i.id));
      saveItems();
      closeSheet('selectSheetBg');
      exitSelectMode();
      showToast('تم الحذف');
    }
  });
});

document.getElementById('btnExport').addEventListener('click', exportBackup);
document.getElementById('btnImportTrigger').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  if(e.target.files[0]) importBackup(e.target.files[0]);
  e.target.value = '';
});

document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightboxFullscreen').addEventListener('click', toggleLightboxFullscreen);
document.getElementById('lightboxFav').addEventListener('click', ()=>{ if(lightboxItemId) toggleFav(lightboxItemId); });
document.getElementById('lightboxPrev').addEventListener('click', lightboxPrev);
document.getElementById('lightboxNext').addEventListener('click', lightboxNext);

document.getElementById('confirmCancelBtn').addEventListener('click', ()=>closeSheet('confirmSheetBg'));
document.getElementById('promptCancelBtn').addEventListener('click', ()=>closeSheet('promptSheetBg'));
document.getElementById('actionSheetCancel').addEventListener('click', ()=>closeSheet('actionSheetBg'));

['addSheetBg','editSheetBg','collectionSheetBg','settingsSheetBg','selectSheetBg','confirmSheetBg','promptSheetBg','actionSheetBg'].forEach(id=>{
  document.getElementById(id).addEventListener('click', e=>{ if(e.target.id === id) closeSheet(id); });
});

loadData();
</script>
</body>
</html>
